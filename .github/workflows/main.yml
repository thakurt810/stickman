name: Stickman Dad Joke Pipeline

on:
  schedule:
    # All times in UTC (IST = UTC+5:30)
    - cron: '30 0 * * *'   #  6:00 AM IST
    - cron: '30 2 * * *'   #  8:00 AM IST
    - cron: '30 4 * * *'   # 10:00 AM IST
    - cron: '30 6 * * *'   # 12:00 PM IST
    - cron: '30 8 * * *'   #  2:00 PM IST
    - cron: '30 10 * * *'  #  4:00 PM IST
    - cron: '30 12 * * *'  #  6:00 PM IST
    - cron: '30 14 * * *'  #  8:00 PM IST
  workflow_dispatch:

jobs:
  generate-video:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    # Needed so the GITHUB_TOKEN can push commits back to the repo
    permissions:
      contents: write

    steps:
      # ── 1. Checkout (full history so we can push back) ──────────────────
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GIT_PAT }}   # PAT so the push is authenticated
          fetch-depth: 0                  # full history avoids shallow-push errors

      # ── 2. Python ──────────────────────────────────────────────────────
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      # ── 3. System deps ─────────────────────────────────────────────────
      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            ffmpeg \
            fonts-dejavu-core \
            fonts-liberation

      # ── 4. Python packages ─────────────────────────────────────────────
      - name: Install Python dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      # ── 5. Run pipeline ────────────────────────────────────────────────
      - name: Run pipeline
        env:
          GOOGLE_DRIVE_FOLDER_ID:    ${{ secrets.GOOGLE_DRIVE_FOLDER_ID }}
          METADATA_DRIVE_FOLDER_ID:  ${{ secrets.METADATA_DRIVE_FOLDER_ID }}
          GDRIVE_TOKEN_BASE64:       ${{ secrets.GDRIVE_TOKEN_BASE64 }}
          GDRIVE_CREDENTIALS_JSON:   ${{ secrets.GDRIVE_CREDENTIALS_JSON }}
          UPLOAD_TO_DRIVE:           "true"
        run: python stickman_dadjoke_v2.py

      # ── 6. Commit state.json back to repo ──────────────────────────────
      - name: Save joke state back to repo
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add state.json
          # Only commit if state.json actually changed
          git diff --cached --quiet || git commit -m "chore: advance joke pointer [skip ci]"
          git push
        env:
          GITHUB_TOKEN: ${{ secrets.GIT_PAT }}

      # ── 7. Upload artifacts to GitHub (backup) ─────────────────────────
      - name: Upload output files
        uses: actions/upload-artifact@v4
        with:
          name: stickman-joke-${{ github.run_number }}
          path: |
            output/*.mp4
            metadata/*.json
          retention-days: 7
